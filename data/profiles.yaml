# Hourly profiles, 24 values each (hour 0..23). Flat mapping; every profile
# declares its `kind`, and a system slots each one into the matching role.
#
# Semantics differ by kind (deliberate, documented):
# - kind: demand -> values are FRACTIONS OF PEAK in [0, 1]; scaled by the
#   system's peak_demand_gw.
# - kind: solar / wind -> values are CAPACITY FACTORS in [0, 1]; multiplied by
#   the technology's installed capacity to get available MW that hour.
#
# Deterministic, hand-drawn shapes (so the tests are exact). ILLUSTRATIVE.

